services:
  db:
    image: aeyzaguirre/database-ecommerce:latest
    container_name: database
    networks:
      - ecomm-net
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=ecommerce
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  
  frontend:
    image: aeyzaguirre/frontend-ecommerce:latest
    container_name: frontend
    networks:
      - ecomm-net
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      products:
        condition: service_started
      orders:
        condition: service_started

  products:
    image: aeyzaguirre/products-ecommerce:latest
    container_name: products
    networks:
      - ecomm-net
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=ecommerce
    depends_on:
      db:
        condition: service_healthy

  orders: 
    image: aeyzaguirre/orders-ecommerce:latest
    container_name: orders
    networks:
      - ecomm-net
    ports:
      - "3002:3002"
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=ecommerce
    depends_on:
      db:
        condition: service_healthy

  scanner:
    image: ghcr.io/aquasecurity/trivy:0.44.0
    volumes:
      - ./scan-reports:/reports
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "trivy image --output /reports/db.json --format json aeyzaguirre/database-ecommerce:latest &&
       trivy image --output /reports/frontend.json --format json aeyzaguirre/frontend-ecommerce:latest &&
       trivy image --output /reports/products.json --format json aeyzaguirre/products-ecommerce:latest &&
       trivy image --output /reports/orders.json --format json aeyzaguirre/orders-ecommerce:latest"

networks:
  ecomm-net:
    driver: bridge

