apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: staging
  labels:
    app: orders
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: orders
        environment: staging
    spec:
      containers:
        - name: orders
          image: aeyzaguirre/orders-ecommerce:latest
          ports:
            - containerPort: 3002
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: staging
  labels:
    app: orders
    environment: staging
spec:
  type: ClusterIP
  selector:
    app: orders
  ports:
    - name: http
      port: 3002
      targetPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: orders-nodeport
  namespace: staging
  labels:
    app: orders
    environment: staging
spec:
  type: NodePort
  selector:
    app: orders
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30012
